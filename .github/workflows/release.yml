name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Collect artifacts
        id: artifacts
        run: |
          # 查找所有 .rpk 文件并整理到单独目录
          mkdir -p release
          find dist -name "*.rpk" -exec cp {} release/ \;
          echo "files=$(ls release/*.rpk | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          echo "count=$(ls release/*.rpk | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*.rpk
