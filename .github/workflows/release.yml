name: Release

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Collect artifacts
        run: |
          mkdir -p release
          find dist -name "*.rpk" -exec cp {} release/ \;

      - name: Create tag
        run: |
          TAG="build-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true
          files: release/*.rpk
